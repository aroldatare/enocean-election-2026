/* ── Sanitize Firebase data (arrays become objects) ── */
function sanitize(data) {
  if (!data) return data;
  if (Array.isArray(data)) return data.map(sanitize);
  if (typeof data === "object") {
    // Check if it looks like an array (numeric keys)
    const keys = Object.keys(data);
    const isArr = keys.length > 0 && keys.every(k => !isNaN(parseInt(k)));
    if (isArr) {
      return keys.sort((a,b)=>parseInt(a)-parseInt(b)).map(k => sanitize(data[k]));
    }
    const out = {};
    for (const k of keys) out[k] = sanitize(data[k]);
    return out;
  }
  return data;
}

/* ── FIREBASE REALTIME SYNC ── */
function useStore(key, def) {
  const [s, set] = useState(def);
  const [synced, setSynced] = useState(false);
  const dbRef = useRef(null);
  const skipNext = useRef(false);

  useEffect(() => {
    try {
      if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      const db = firebase.database();
      dbRef.current = db.ref(key);
      dbRef.current.on("value", snap => {
        const val = snap.val();
        if (val !== null) {
          skipNext.current = true;
          set(sanitize(val));
        }
        setSynced(true);
      });
    } catch(e) {
      console.error("Firebase error:", e);
      try { const v = localStorage.getItem(key); if (v) set(JSON.parse(v)); } catch {}
      setSynced(true);
    }
    return () => { if (dbRef.current) dbRef.current.off(); };
  }, []);

  useEffect(() => {
    if (!synced) return;
    if (skipNext.current) { skipNext.current = false; return; }
    if (dbRef.current) {
      dbRef.current.set(s);
    } else {
      try { localStorage.setItem(key, JSON.stringify(s)); } catch {}
    }
  }, [s, synced]);

  return [s, set, synced, true];
}

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,backdropFilter:"blur(4px)"}}>
      <div style={{background:"#0d0d0d",border:"1px solid #2a2a2a",borderRadius:8,padding:32,width:400,maxWidth:"90vw",boxShadow:"0 40px 80px rgba(0,0,0,0.8)",animation:"fadeUp 0.2s ease"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:700,color:"#fff",marginBottom:24,letterSpacing:"-0.02em"}}>New Session</div>
        <label style={lbl}>Date</label>
        <input style={inp} value={date} onChange={e=>setDate(e.target.value)} placeholder="e.g. 15.03.2026"
          onFocus={e=>e.target.style.borderColor="#5de88a"} onBlur={e=>e.target.style.borderColor="#2a2a2a"}/>
        <label style={lbl}>Title</label>
        <input style={inp} value={title} onChange={e=>setTitle(e.target.value)} placeholder="Meeting title"
          onFocus={e=>e.target.style.borderColor="#5de88a"} onBlur={e=>e.target.style.borderColor="#2a2a2a"}/>
        <label style={lbl}>Created by</label>
        <select style={{...inp,marginBottom:24}} value={author} onChange={e=>setAuthor(e.target.value)}>
          {MEMBERS.map(m=><option key={m}>{m}</option>)}
        </select>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>onSave(date,title,author)} style={{flex:1,background:"#1a3a25",border:"none",color:"#5de88a",borderRadius:4,padding:"10px",fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:"0.12em",fontWeight:600,cursor:"pointer"}}>CREATE SESSION</button>
          <button onClick={onClose} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#555",borderRadius:4,padding:"10px 16px",fontFamily:"'DM Mono',monospace",fontSize:11,cursor:"pointer"}}>cancel</button>
        </div>
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [meetings, setMeetings, synced, configured] = useStore("enocean_notes_v1", SEED);
  const [active, setActive] = useState("m1");
  const [showModal, setShowModal] = useState(false);
  const [confetti, setConfetti] = useState([]);

  const current = meetings.find(m=>m.id===active)||meetings[0];

  function boom() {
    const cols=["#5de88a","#60b4ff","#e8d45d","#ff8c60","#c084fc","#5de8e8"];
    setConfetti(Array.from({length:20},(_,i)=>({id:Date.now()+i,x:20+Math.random()*60,color:cols[i%cols.length],delay:Math.random()*0.3,size:5+Math.random()*5})));
    setTimeout(()=>setConfetti([]),1400);
  }

  function toggleItem(mid,iid) {
    const item=meetings.find(m=>m.id===mid)?.items.find(i=>i.id===iid);
    if(item&&!item.done) boom();
    setMeetings(meetings.map(m=>m.id===mid?{...m,items:m.items.map(i=>i.id===iid?{...i,done:!i.done}:i)}:m));
  }
  function addItem(mid,text,tag){if(!text.trim())return;setMeetings(meetings.map(m=>m.id===mid?{...m,items:[...m.items,{id:`i-${Date.now()}`,text,tag,done:false}]}:m));}
  function editItem(mid,iid,text,tag){setMeetings(meetings.map(m=>m.id===mid?{...m,items:m.items.map(i=>i.id===iid?{...i,text,tag}:i)}:m));}
  function deleteItem(mid,iid){setMeetings(meetings.map(m=>m.id===mid?{...m,items:m.items.filter(i=>i.id!==iid)}:m));}
  function addComment(mid,text,author){if(!text.trim())return;setMeetings(meetings.map(m=>m.id===mid?{...m,comments:[...m.comments,{id:`c-${Date.now()}`,author,text,time:new Date().toLocaleString("de-DE")}]}:m));}
  function deleteMeeting(mid){const r=meetings.filter(m=>m.id!==mid);setMeetings(r);setActive(r[0]?.id||null);}
  function createMeeting(date,title,author){
    if(!date||!title)return;
    const m={id:`m-${Date.now()}`,date,title,author,items:[],comments:[]};
    setMeetings([...meetings,m]);setActive(m.id);setShowModal(false);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#080808",overflow:"hidden",fontFamily:"'DM Sans',sans-serif"}}>
      {/* Confetti */}
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999,overflow:"hidden"}}>
        {confetti.map(p=>(
          <div key={p.id} style={{position:"absolute",left:`${p.x}%`,top:-10,width:p.size,height:p.size,borderRadius:2,background:p.color,animation:`fall 1.4s ease-in forwards`,animationDelay:`${p.delay}s`}}/>
        ))}
      </div>

      {/* Firebase setup banner */}
      {!configured && (
        <div style={{background:"#1a2a1a",borderBottom:"1px solid #2a4a2a",padding:"10px 28px",display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#5de88a",letterSpacing:"0.12em"}}>⚠ RUNNING IN LOCAL MODE</span>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#444"}}>—</span>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#555"}}>Add your Firebase config to enable real-time sync across all 4 committee members</span>
        </div>
      )}
      {configured && !synced && (
        <div style={{background:"#1a1a2a",borderBottom:"1px solid #2a2a4a",padding:"10px 28px"}}>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#60b4ff",letterSpacing:"0.12em"}}>⟳ CONNECTING TO DATABASE...</span>
        </div>
      )}
      {configured && synced && (
        <div style={{background:"#0f1a0f",borderBottom:"1px solid #1a3a1a",padding:"8px 28px",display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"#5de88a",display:"inline-block",boxShadow:"0 0 6px #5de88a"}}/>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#2a4a2a",letterSpacing:"0.12em"}}>LIVE SYNC ACTIVE — all committee members see changes in real time</span>
        </div>
      )}

      <Header meetings={meetings} onNew={()=>setShowModal(true)}/>

      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* Sidebar */}
        <div style={{width:220,borderRight:"1px solid #141414",background:"#090909",overflowY:"auto",flexShrink:0}}>
          {meetings.map(m=>{
            const open=m.items.filter(i=>!i.done).length;
            const pct=m.items.length?Math.round(m.items.filter(i=>i.done).length/m.items.length*100):0;
            const isActive=active===m.id;
            return (
              <button key={m.id} onClick={()=>setActive(m.id)} style={{display:"block",width:"100%",textAlign:"left",border:"none",borderLeft:`3px solid ${isActive?"#5de88a":"transparent"}`,borderBottom:"1px solid #141414",padding:"16px",cursor:"pointer",transition:"all 0.15s",background:isActive?"#0f1a12":"transparent"}}
                onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background="#0d0d0d"}}
                onMouseLeave={e=>{if(!isActive)e.currentTarget.style.background="transparent"}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#5de88a",letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:5}}>{m.date}</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:12,fontWeight:600,color:isActive?"#fff":"#555",lineHeight:1.3,marginBottom:8}}>{m.title}</div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{flex:1,height:2,background:"#141414",borderRadius:99}}>
                    <div style={{width:`${pct}%`,height:"100%",background:"#5de88a",borderRadius:99,transition:"width 0.4s"}}/>
                  </div>
                  {open>0&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#5de88a",background:"#1a3a25",padding:"1px 5px",borderRadius:3}}>{open}</span>}
                </div>
              </button>
            );
          })}
        </div>

        {/* Main */}
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {current ? (
            <MeetingPanel meeting={current} onToggle={toggleItem} onAddItem={addItem} onEditItem={editItem} onDeleteItem={deleteItem} onAddComment={addComment} onDelete={deleteMeeting}/>
          ) : (
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",flex:1,fontFamily:"'DM Mono',monospace",fontSize:11,color:"#222",letterSpacing:"0.16em",textTransform:"uppercase"}}>NO SESSION SELECTED</div>
          )}
        </div>
      </div>

      {showModal&&<Modal onClose={()=>setShowModal(false)} onSave={createMeeting}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
